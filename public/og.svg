<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Dark slate background to match the app's ink-900 -->
  <rect width="1200" height="630" fill="#0e0e10"/>

  <!-- Soft brand-orange glow top-left, same vibe as the homepage hero -->
  <defs>
    <radialGradient id="glow" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ff7a2d" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#ff7a2d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand mark — orange rounded square with dark inset, scaled up -->
  <g transform="translate(80 80)">
    <rect width="96" height="96" rx="18" fill="#ff7a2d"/>
    <rect x="18" y="18" width="60" height="60" rx="6" fill="#0e0e10"/>
  </g>

  <!-- Wordmark — "Beme" -->
  <text
    x="200"
    y="155"
    font-family="Inter, system-ui, sans-serif"
    font-size="72"
    font-weight="800"
    fill="#f3f3f4"
    letter-spacing="-2"
  >Beme</text>

  <!-- Tagline under wordmark -->
  <text
    x="200"
    y="190"
    font-family="Inter, system-ui, sans-serif"
    font-size="20"
    font-weight="400"
    fill="#9ca0a8"
  >Building estimates made easy</text>

  <!-- Headline — main value prop -->
  <text
    x="80"
    y="370"
    font-family="Inter, system-ui, sans-serif"
    font-size="68"
    font-weight="800"
    fill="#f3f3f4"
    letter-spacing="-2"
  >Estimates that match</text>
  <text
    x="80"
    y="445"
    font-family="Inter, system-ui, sans-serif"
    font-size="68"
    font-weight="800"
    fill="#f3f3f4"
    letter-spacing="-2"
  >what you build.</text>

  <!-- Subhead chip at bottom -->
  <g transform="translate(80 525)">
    <rect width="450" height="44" rx="22" fill="#ff7a2d" fill-opacity="0.12" stroke="#ff7a2d" stroke-opacity="0.4"/>
    <circle cx="22" cy="22" r="4" fill="#ff7a2d"/>
    <text
      x="40"
      y="28"
      font-family="Inter, system-ui, sans-serif"
      font-size="16"
      font-weight="500"
      fill="#fdba74"
    >Built for brick and block estimators. More trades soon.</text>
  </g>

  <!-- URL bottom-right -->
  <text
    x="1120"
    y="588"
    font-family="Inter, system-ui, sans-serif"
    font-size="18"
    font-weight="500"
    fill="#6d717a"
    text-anchor="end"
  >beme.com.au</text>
</svg>

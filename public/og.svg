<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Dark slate background to match the app's ink-900 -->
  <rect width="1200" height="630" fill="#0e0e10"/>

  <!-- Soft brand-orange glow top-left, same vibe as the homepage hero -->
  <defs>
    <radialGradient id="glow" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ff7a2d" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#ff7a2d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Stacked logo lockup: the wordmark sits on top of the two-cell
       masonry block, which rests beneath it like a footing. The dark
       page bg (#0e0e10) shows through the two transparent cells. -->
  <text
    x="80"
    y="126"
    font-family="'Source Serif 4', Georgia, 'Times New Roman', serif"
    font-size="66"
    font-weight="800"
    fill="#f3f3f4"
    letter-spacing="-1"
  >Beme</text>
  <g transform="translate(80 146) scale(1.44)">
    <path fill-rule="evenodd" clip-rule="evenodd" fill="#ff7a2d"
      d="M9 0 H95 A9 9 0 0 1 104 9 V47 A9 9 0 0 1 95 56 H9 A9 9 0 0 1 0 47 V9 A9 9 0 0 1 9 0 Z
         M15 11 H42 A4 4 0 0 1 46 15 V41 A4 4 0 0 1 42 45 H15 A4 4 0 0 1 11 41 V15 A4 4 0 0 1 15 11 Z
         M62 11 H89 A4 4 0 0 1 93 15 V41 A4 4 0 0 1 89 45 H62 A4 4 0 0 1 58 41 V15 A4 4 0 0 1 62 11 Z"/>
  </g>

  <!-- Headline — main value prop -->
  <text
    x="80"
    y="370"
    font-family="'Source Serif 4', Georgia, 'Times New Roman', serif"
    font-size="68"
    font-weight="800"
    fill="#f3f3f4"
    letter-spacing="-2"
  >Estimates that match</text>
  <text
    x="80"
    y="445"
    font-family="'Source Serif 4', Georgia, 'Times New Roman', serif"
    font-size="68"
    font-weight="800"
    fill="#f3f3f4"
    letter-spacing="-2"
  >what you build.</text>

  <!-- Subhead chip at bottom -->
  <g transform="translate(80 525)">
    <rect width="450" height="44" rx="22" fill="#ff7a2d" fill-opacity="0.12" stroke="#ff7a2d" stroke-opacity="0.4"/>
    <circle cx="22" cy="22" r="4" fill="#ff7a2d"/>
    <text
      x="40"
      y="28"
      font-family="Inter, system-ui, sans-serif"
      font-size="16"
      font-weight="500"
      fill="#fdba74"
    >Built for brick and block estimators. More trades soon.</text>
  </g>

  <!-- URL bottom-right -->
  <text
    x="1120"
    y="588"
    font-family="Inter, system-ui, sans-serif"
    font-size="18"
    font-weight="500"
    fill="#6d717a"
    text-anchor="end"
  >beme.com.au</text>
</svg>
